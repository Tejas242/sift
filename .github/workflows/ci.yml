name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Download libtokenizers
        run: |
          mkdir -p lib
          curl -L -o lib/libtokenizers.tar.gz https://github.com/daulet/tokenizers/releases/download/v1.25.0/libtokenizers.linux-amd64.tar.gz
          tar -xzf lib/libtokenizers.tar.gz -C lib/
          ls -la lib

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        run: go test ./internal/chunker/... ./internal/hnsw/... ./internal/index/... -v -timeout 60s

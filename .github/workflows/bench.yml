name: Continuous Benchmarking

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write
  deployments: write

jobs:
  benchmark:
    name: Run and Track Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Download libtokenizers
        run: |
          mkdir -p lib
          curl -L -o lib/libtokenizers.tar.gz https://github.com/daulet/tokenizers/releases/download/v1.25.0/libtokenizers.linux-amd64.tar.gz
          tar -xzf lib/libtokenizers.tar.gz -C lib/
          ls -la lib

      - name: Run Benchmarks
        run: |
          go test -bench=BenchmarkHNSW -run=^$ ./internal/hnsw/... | tee bench_output.txt

      - name: Initialize gh-pages branch if not exists
        if: github.ref == 'refs/heads/master'
        run: |
          if ! git ls-remote --heads origin gh-pages | grep -q 'refs/heads/gh-pages'; then
            echo "gh-pages branch does not exist. Initializing..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git checkout --orphan gh-pages
            git rm -rf .
            touch .nojekyll
            git add .nojekyll
            git commit -m "Initialize gh-pages branch"
            git push origin gh-pages
            git checkout master
          else
            echo "gh-pages branch already exists."
          fi

      - name: Store Benchmark Results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Go HNSW Benchmarks
          tool: 'go'
          output-file-path: bench_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: true
          auto-push: ${{ github.ref == 'refs/heads/master' }}
